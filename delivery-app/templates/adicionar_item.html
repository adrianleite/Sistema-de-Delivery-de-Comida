<!DOCTYPE html>
<html>
<head>
    <title>Adicionar Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2>Adicionar Item</h2>

    <form method="post" class="card p-4">

        <div class="mb-3">
            <label>Pedido</label>
            <select name="pedido" class="form-select">
                {% for p in pedidos %}
                    <option value="{{ p.id_pedido }}">
                        Pedido {{ p.id_pedido }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Prato</label>
            <select name="prato" class="form-select">
                {% for pr in pratos %}
                    <option value="{{ pr.id_prato }}">
                        {{ pr.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Quantidade</label>
            <input name="quantidade" type="number" class="form-control" min="1">
        </div>

        <button class="btn btn-success">Adicionar</button>
        <a href="/" class="btn btn-secondary">Voltar</a>

    </form>
</div>

</body>
</html>
